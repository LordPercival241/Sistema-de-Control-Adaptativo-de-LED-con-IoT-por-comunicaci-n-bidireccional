# ============================================================================
# CONFIGURACIÓN DE PLATFORMIO - PROYECTO IoT CONTROL LED
# ============================================================================
# Este archivo configura el entorno de compilación para el ESP32

[env:esp32doit-devkit-v1]
; Plataforma: ESP32
platform = espressif32@^6.6.0

; Tarjeta específica: ESP32 DoIT DevKit v1
board = esp32doit-devkit-v1

; Framework: Arduino
framework = arduino

; Velocidad de baudrate para comunicación serial
monitor_speed = 115200

; Puerto de carga (detectado automáticamente, o especificar COM port)
; upload_port = COM3

; Frecuencia de CPU
board_build.f_cpu = 240000000L

; Memoria PSRAM si está disponible
board_build.psram_mode = qio

; Librerías externas necesarias
lib_deps =
    ; WiFi y HTTP (incluidas en Arduino para ESP32)
    ; ArduinoJson para manejo JSON
    ArduinoJson@^6.21.0

; Definiciones de compilación
build_flags =
    ; Habilitar logs del sistema
    -DCORE_DEBUG_LEVEL=3

; Carpeta de fuentes
src_dir = main/src

; Carpeta de includes
include_dir = include

